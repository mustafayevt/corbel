# This file is included from the main nginx.conf's `http {}` block (conf.d/*.conf), so http-context
# directives like `map` are valid here.
#
# HSTS only makes sense once the origin is actually served over TLS. This container terminates plain
# HTTP on 8080; in a real deploy TLS terminates at an upstream proxy/LB that forwards the original
# scheme in X-Forwarded-Proto. Emit HSTS only when that says https — the shipped HTTP-only compose
# stack leaves the header empty (nginx drops add_header with an empty value), so it sends nothing.
map $http_x_forwarded_proto $hsts_header {
    https   "max-age=31536000; includeSubDomains";
    default "";
}

# Scheme to forward to the backend: prefer what an upstream TLS-terminating proxy already set, and fall
# back to this server's own scheme for direct access. Keeps the backend's ForwardedHeaders / HTTPS
# redirection correct in both topologies (vs. blindly forwarding $scheme, which would always say http).
map $http_x_forwarded_proto $forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

# Server block for the Corbel SPA container. Copied to /etc/nginx/conf.d/default.conf.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version, and gzip text assets. nginx >= 1.21.1 (this image) serves .js as
    # text/javascript, so that type MUST be listed or the SPA's largest assets ship uncompressed.
    server_tokens off;
    gzip on;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;

    # Cap proxied /api request bodies to match the API's 1 MiB Kestrel limit, so oversized payloads are
    # rejected at the edge instead of being buffered here only for Kestrel to 413 them. Raise BOTH this and
    # ServiceRegistration's MaxRequestBodySize together if an endpoint needs to accept larger bodies.
    client_max_body_size 1m;

    # Security headers. CSP is strict default-src 'self': scripts/styles/fonts/images/XHR are same-origin
    # only. 'unsafe-inline' is allowed for styles solely because runtime-injected inline styles can occur;
    # scripts stay 'self' (Vite emits external, hashed bundles — no inline <script>). NOTE: if you point
    # VITE_API_BASE_URL at a different host (the split mobile/API origin documented in web/src/lib/env.ts),
    # widen connect-src to include that origin or the browser will block every API call as a CSP violation.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
    # Isolate this browsing context from cross-origin openers/popups (Spectre-class + tab-nabbing hardening).
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # Empty (and thus omitted) unless an upstream proxy forwarded X-Forwarded-Proto: https — see the map above.
    add_header Strict-Transport-Security $hsts_header always;

    # Proxy the API to the backend service on the same Docker network. The browser only ever sees
    # same-origin `/api`, so no CORS and first-party auth cookies.
    location /api/ {
        # Re-resolve `api` through Docker's embedded DNS instead of caching its IP at config-load time, so
        # recreating just the api container (a new IP) doesn't leave nginx proxying a dead address until reload.
        # No URI on proxy_pass → the original request URI (/api/...) is forwarded unchanged.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # The backend's ForwardedHeaders + HTTPS redirection/HSTS rely on a correct forwarded scheme
        # (see the $forwarded_proto map above).
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # Bound the upstream conversation so a slow/stuck API can't pin nginx workers indefinitely.
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Fingerprinted build assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # A location-level add_header suppresses inheritance of the server-level security headers, so re-assert
        # nosniff here — the hashed JS/CSS bundles are the largest, most-requested responses and must not be
        # MIME-sniffed. (CSP/X-Frame-Options are document-scoped, so they don't matter for static assets.)
        add_header X-Content-Type-Options "nosniff" always;
        # Serve the build-time precompressed `.gz` (vite-plugin-compression2) with zero per-request CPU; fall
        # back to on-the-fly `gzip on` for anything without a sibling. The `.br` files also ship for a
        # brotli-capable CDN/upstream (the stock nginx image has no brotli module).
        gzip_static on;
        try_files $uri =404;
    }

    # index.html references the hashed bundles, so it must never be cached: serve it always-revalidate so a
    # redeploy can't strand clients on an old shell pointing at purged assets. (The SPA fallback's internal
    # try_files redirect to /index.html is matched here too.) `expires -1` emits Cache-Control: no-cache via
    # the headers module WITHOUT an add_header here — which is deliberate: a location-level add_header would
    # suppress inheritance of the server-level security headers (CSP etc.) on the main document.
    location = /index.html {
        expires -1;
    }

    # SPA fallback: every unknown path returns index.html so the client router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
